<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}CaféQueue{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}"/>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="#FF6B35"/>
        <path d="M8 18c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <path d="M14 12V8M11 10l3-4 3 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M20 18h2a1 1 0 000-2h-2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">CaféQueue</div>
      <div class="brand-sub">Queue Management</div>
    </div>
  </div>

  <div class="sidebar-section-label">MAIN</div>
  <nav class="sidebar-nav">
    <a href="/"         class="nav-item {% if request.path=='/' %}active{% endif %}">
      <span class="nav-icon">⊞</span><span>Dashboard</span>
    </a>
    <a href="/orders"   class="nav-item {% if request.path=='/orders' %}active{% endif %}">
      <span class="nav-icon">＋</span><span>New Order</span>
    </a>
    <a href="/cleaning" class="nav-item {% if request.path=='/cleaning' %}active{% endif %}">
      <span class="nav-icon">✦</span><span>Cleaning</span>
    </a>
  </nav>

  <div class="sidebar-section-label">MONITOR</div>
  <nav class="sidebar-nav">
    <a href="/queues"  class="nav-item {% if request.path=='/queues' %}active{% endif %}">
      <span class="nav-icon">≡</span><span>Queues</span>
    </a>
    <a href="/history" class="nav-item {% if request.path=='/history' %}active{% endif %}">
      <span class="nav-icon">◷</span><span>History</span>
    </a>
    <a href="/logs"    class="nav-item {% if request.path=='/logs' %}active{% endif %}">
      <span class="nav-icon">◎</span><span>Logs</span>
    </a>
  </nav>

  <div class="sidebar-section-label">SYSTEM</div>
  <nav class="sidebar-nav">
    <a href="/setup" class="nav-item {% if request.path=='/setup' %}active{% endif %}">
      <span class="nav-icon">⚙</span><span>Setup</span>
    </a>
  </nav>

  <!-- Live stats pill -->
  <div class="sidebar-footer">
    <div class="live-pill">
      <span class="live-dot"></span>
      <span id="sb-ready">—</span> ready &nbsp;·&nbsp;
      <span id="sb-occ">—</span> occupied
    </div>
  </div>
</aside>

<!-- Main area -->
<div class="main-wrap">
  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="topbar-title">{% block page_title %}{% endblock %}</h1>
      <p class="topbar-sub">{% block page_sub %}{% endblock %}</p>
    </div>
    <div class="topbar-right">
      <div class="topbar-time" id="topbar-time"></div>
      <div class="topbar-status">
        <span class="status-dot"></span> Live
      </div>
    </div>
  </header>

  <!-- Page content -->
  <main class="page-content">
    {% block content %}{% endblock %}
  </main>
</div>

<!-- Toast container -->
<div id="toasts"></div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
